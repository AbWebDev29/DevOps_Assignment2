apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-website-deployment
  labels:
    app: abc-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abc-website
  template:
    metadata:
      labels:
        app: abc-website
    spec:
      containers:
      - name: website-container
        image: abc-website:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: abc-website-service
spec:
  type: NodePort
  selector:
    app: abc-website
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
